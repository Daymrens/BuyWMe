name: grocery_mate
description: A fully offline grocery companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  mobile_scanner: ^5.1.1
  fl_chart: ^0.68.0
  uuid: ^4.3.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  http: ^1.2.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  csv: ^6.0.0
  archive: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0
  coverage: ^1.6.0
  mocktail: ^1.0.0
  bloc_test: ^9.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/